<!DOCTYPE html>
<html>
<head>
  <title>ProofLess Lite</title>
<style>
  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    margin: 0;
    padding: 20px;
    color: #333;
  }

  .logo-container {
  text-align: center;
  margin-bottom: 15px;
}

.logo {
  width: 180px;
  height: auto;
  transition: 0.3s;
}

.logo:hover {
  transform: scale(1.05);
}

  h1 {
    text-align: center;
    color: white;
    margin-bottom: 20px;
  }

  .container {
    max-width: 500px;
    margin: auto;
    background: rgba(255,255,255,0.95);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  input, button, select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
  }

  input, select {
    background: #f1f3f6;
  }

  button {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    transform: scale(1.03);
  }

  .doc {
    background: white;
    padding: 15px;
    margin-top: 12px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.2s;
  }

  .doc:hover {
    transform: translateY(-3px);
  }

  .status {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: bold;
  }

  .verified {
    background: #d4edda;
    color: #155724;
  }

  .unverified {
    background: #f8d7da;
    color: #721c24;
  }

  .link {
    font-size: 12px;
    color: #555;
    margin-top: 5px;
  }

  .actions button {
    width: auto;
    margin: 5px 5px 0 0;
    padding: 6px 12px;
    font-size: 12px;
    border-radius: 20px;
  }

  .empty {
    text-align: center;
    margin-top: 20px;
    color: #777;
  }
</style>
  
</head>

<body>
    
  <h1 style="text-align:center; color:white;">
    📄 ProofLess Lite
  </h1>

  <div class="container">
</h1>

<div class="container">

  <button onclick="toggleDarkMode()">🌙 Toggle Dark Mode</button>

  <input type="file" id="fileInput" accept=".pdf,.jpg,.png">
  <button onclick="upload()">Upload Document</button>

  <input type="text" id="search" placeholder="Search documents..." oninput="display()">

  <select id="filter" onchange="display()">
    <option value="all">All</option>
    <option value="verified">Verified</option>
    <option value="unverified">Unverified</option>
  </select>

  <div id="docList"></div>

</div>

<script>
let docs = JSON.parse(localStorage.getItem("docs")) || [];

function save() {
  localStorage.setItem("docs", JSON.stringify(docs));
}

function generateLink() {
  return "ID-" + Math.random().toString(36).substring(2, 8);
}

function upload() {
  const fileInput = document.getElementById("fileInput");

  if (!fileInput.files[0]) return alert("Select a file");

  const file = fileInput.files[0];

  if (docs.some(d => d.name === file.name)) {
    return alert("File already uploaded");
  }

  docs.push({
    name: file.name,
    status: false,
    link: generateLink(),
    date: new Date().toLocaleDateString()
  });

  fileInput.value = "";
  save();
  display();
}

function toggleStatus(i) {
  docs[i].status = !docs[i].status;
  save();
  display();
}

function deleteDoc(i) {
  docs.splice(i, 1);
  save();
  display();
}

function copyLink(link) {
  navigator.clipboard.writeText(link);
  alert("Link copied!");
}

function toggleDarkMode() {
  document.body.classList.toggle("dark");
}

function display() {
  const list = document.getElementById("docList");
  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;

  list.innerHTML = "";

  let filtered = docs.filter(doc => 
    doc.name.toLowerCase().includes(search)
  );

  if (filter === "verified") {
    filtered = filtered.filter(d => d.status);
  } else if (filter === "unverified") {
    filtered = filtered.filter(d => !d.status);
  }

  if (filtered.length === 0) {
    list.innerHTML = "<div class='empty'>No documents found</div>";
    return;
  }

  filtered.forEach((doc, i) => {
    const div = document.createElement("div");
    div.className = "doc";

    div.innerHTML = `
      <strong>${doc.name}</strong><br>

      <span class="status ${doc.status ? 'verified' : 'unverified'}">
        ${doc.status ? 'Verified' : 'Unverified'}
      </span>

      <div class="link">Link: ${doc.link}</div>
      <div class="link">Uploaded: ${doc.date}</div>

      <div class="actions">
        <button onclick="toggleStatus(${i})">
          ${doc.status ? "Unverify" : "Verify"}
        </button>
        <button onclick="copyLink('${doc.link}')">Copy</button>
        <button onclick="deleteDoc(${i})">Delete</button>
      </div>
    `;

    list.appendChild(div);
  });
}

display();
</script>

</body>
</html>
